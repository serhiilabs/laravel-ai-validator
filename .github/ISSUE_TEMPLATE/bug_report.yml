name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: input
    id: php-version
    attributes:
      label: PHP Version
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel Version
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package Version
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
